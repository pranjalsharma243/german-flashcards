services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: german_flashcards_postgres
    environment:
      POSTGRES_DB: flashcards
      POSTGRES_USER: flashcards
      POSTGRES_PASSWORD: flashcards
    ports:
      - "5433:5432"
    volumes:
      - flashcards_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashcards -d flashcards"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: german_flashcards_redis
    ports:
      - "6379:6379"
    volumes:
      - flashcards_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  flashcards_postgres_data:
  flashcards_redis_data:
