#     GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/login/oauth2/code/google}
#     FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}

volumes:
  flashcards_postgres_data:
  flashcards_redis_data:
