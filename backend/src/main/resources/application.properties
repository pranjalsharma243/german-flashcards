spring.application.name=german-flashcards
server.port=8080
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/flashcards}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:flashcards}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:flashcards}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Production: set APP_JWT_SECRET env var to: openssl rand -base64 32
app.jwt.secret=${APP_JWT_SECRET:4Y8XMaKslO0EOE/WURg8TX7scO17m2wuCHqirwAUuzs=}
app.jwt.expiration-seconds=604800

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
# AI responses cached for 24 hours (cost control)
spring.cache.redis.cache-null-values=false

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# OpenAI / Spring AI — set OPENAI_API_KEY env var in production
spring.ai.openai.api-key=${OPENAI_API_KEY:disabled}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=400

# pgvector semantic search
spring.ai.openai.embedding.options.model=text-embedding-3-small
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.initialize-schema=true

# File upload limits (screenshots and PDFs can be large)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Google OAuth2 — set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET env vars
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# Frontend origin for OAuth2 success redirect
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
