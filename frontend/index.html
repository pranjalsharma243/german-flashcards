<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Master German B1.1 vocabulary with interactive flashcards, quizzes, and smart progress tracking." />
    <meta name="theme-color" content="#0f2b31" />
    <script>
      (() => {
        try {
          const theme = localStorage.getItem('flashcards-theme');
          const dark = theme === 'dark';
          document.documentElement.classList.toggle('dark', dark);
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', dark ? '#020617' : '#0f2b31');
        } catch {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    <title>Deutsch Meister — German Flashcards</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
